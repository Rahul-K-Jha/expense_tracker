name: expense_tracker
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.19.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  http: ^1.4.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.3
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  intl: ^0.19.0
  fl_chart: ^0.70.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  csv: ^6.0.0
  pdf: ^3.11.1
  open_file: ^3.5.10
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo_mini.png"
